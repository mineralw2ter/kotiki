<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>котикииии</title>
    <style>
        @font-face {
            font-family: 'ouroboros';
            src: url('ouroboros.ttf') format('truetype');
            font-display: swap;
        }
        body { 
            margin: 0; padding: 0; background: #111; color: white; 
            font-family: 'ouroboros', sans-serif; overflow: hidden; 
            touch-action: none; user-select: none; -webkit-user-select: none; 
        }
        canvas { display: block; touch-action: none; }
        .font-preloader { position: absolute; opacity: 0; pointer-events: none; font-family: 'ouroboros'; }
    </style>
</head>
<body>
<div class="font-preloader">котики прелоад</div>
<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

// --- Настройки ---
const levelSettings = {
    1: { minScore: 0, speed: 1.0, title: "Уровень 1" },
    2: { minScore: 100, speed: 1.4, title: "Уровень 2" },
    3: { minScore: 250, speed: 2.0, title: "Уровень 3" },
    4: { minScore: 400, speed: 2.4, title: "Уровень 4" },
    5: { minScore: 600, speed: 3.0, title: "Уровень 5" },
    6: { minScore: 800, speed: 3.4, title: "Уровень 6" },
    7: { minScore: 1000, speed: 4.0, title: "Уровень 7" }
};

const images = {};
const imgSources = {
    cat: 'cat.png', star: 'star.png', bomb: 'bomb.png', fish: 'fish.png',
    heart: 'heart.png', pepper: 'pepper.png', milk: 'milk.png', cucumber: 'cucumber.png',
    can: 'can.png' 
};
const loadedImages = {};
for (let key in imgSources) {
    images[key] = new Image();
    images[key].src = imgSources[key];
    images[key].onload = () => { loadedImages[key] = true; };
}

// --- Звуки ---
const bgMusic = new Audio('music.mp3');
bgMusic.loop = true;
bgMusic.volume = 0.5;

const sndCollect = new Audio('collect.mp3');
const sndBurn = new Audio('burn.mp3');
const sndExplode = new Audio('explosion.mp3');

// Громкость эффектов чуть ниже музыки
sndCollect.volume = 0.3;
sndBurn.volume = 0.3;
sndExplode.volume = 0.4;

function playSound(sound) {
    if (!isMusicMuted) {
        sound.currentTime = 0;
        sound.play().catch(() => {});
    }
}

const cat = { x: 0, y: 0, w: 19, h: 17, scale: 4 };
let W, H, dpr = window.devicePixelRatio || 1;
let state = "menu", items = [], score = 0, highScore = 0;
let level = 1, lives = 3, bombChaos = 1.0, milkTimer = 0, buffTimer = 0;
let jumpLock = 0, jumpDir = 0, petals = [];
let selectedItem = null;
let isDragging = false, lastX = 0;
let isMusicMuted = false;
let showUpdateModal = false;

let itemsDB = {
    star: { name: "Звезда", desc: "Даёт +1 очко и сияет (но не ярче тебя, конечно).", unlocked: false },
    fish: { name: "Рыбка", desc: "Дает +2 очка, Буся одобряет.", unlocked: false },
    pepper: { name: "Острый перец", desc: "+5 очков, НО ускоряет и увеличивает бомбы. Выбор за тобой)))", unlocked: false },
    heart: { name: "Сердечко", desc: "Падает редко шо пиздец, но лечит жизни. +1 сердечко.", unlocked: false },
    bomb: { name: "Бомба", desc: "ВЗРЫВООПАСНО!!! – 1 сердечко.", unlocked: false }, 
    milk: { name: "Молочко", desc: "Замедляет бомбочки на время. +3 очка.", unlocked: false },
    cucumber: { name: "Огурец", desc: "-2 очка. Буся НЕ ОДОБРЯЕТ (кот отпрыгивает).", unlocked: false },
    can: { name: "Консерва", desc: "+4 очка. Увеличивает всю хорошую еду на время.", unlocked: false }
};

try {
    let savedDB = JSON.parse(localStorage.getItem("catCollection"));
    if (savedDB) {
        for (let key in savedDB) { if (itemsDB[key]) itemsDB[key].unlocked = savedDB[key]; }
    }
    highScore = parseInt(localStorage.getItem("catHighScore")) || 0;
} catch(e) { console.log("Ошибка данных"); }

function saveCollection() {
    let toSave = {};
    for (let key in itemsDB) { toSave[key] = itemsDB[key].unlocked; }
    localStorage.setItem("catCollection", JSON.stringify(toSave));
}

function resize() {
    W = window.innerWidth; H = window.innerHeight;
    canvas.width = W * dpr; canvas.height = H * dpr;
    canvas.style.width = W + "px"; canvas.style.height = H + "px";
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.imageSmoothingEnabled = false;
    cat.x = W / 2; cat.y = H - 100;
    petals = [];
    for (let i = 0; i < 40; i++) {
        petals.push({ x: Math.random() * W, y: Math.random() * H, speed: 0.8 + Math.random() * 1.2, size: 4 + Math.random() * 4, angle: Math.random() * Math.PI * 2, swing: Math.random() * 2 });
    }
}
window.addEventListener("resize", resize);

function wrapText(text, x, y, maxWidth, lineHeight) {
    const words = text.split(' ');
    let line = '';
    for (let n = 0; n < words.length; n++) {
        let testLine = line + words[n] + ' ';
        let metrics = ctx.measureText(testLine);
        if (metrics.width > maxWidth && n > 0) {
            ctx.fillText(line, x, y);
            line = words[n] + ' ';
            y += lineHeight;
        } else {
            line = testLine;
        }
    }
    ctx.fillText(line, x, y);
}

function resetGame() {
    score = 0; items = []; lives = 3; level = 1; bombChaos = 1.0; milkTimer = 0; buffTimer = 0; jumpLock = 0;
}

function startAction(clientX, clientY) {
    if (bgMusic.paused && !isMusicMuted) bgMusic.play().catch(() => {});
    
    if (showUpdateModal) {
        showUpdateModal = false;
        return;
    }

    const dist = Math.hypot(clientX - (W - 40), clientY - (H - 40));
    if (dist < 25) { 
        isMusicMuted = !isMusicMuted;
        bgMusic.muted = isMusicMuted;
        return;
    }

    const midX = W / 2, midY = H / 2;

    if (state === "menu") {
        if (clientX > midX - 80 && clientX < midX + 80 && clientY > midY - 80 && clientY < midY - 40) { resetGame(); state = "game"; }
        else if (clientX > midX - 80 && clientX < midX + 80 && clientY > midY - 10 && clientY < midY + 30) { state = "collection"; selectedItem = null; }
        else if (clientX > midX - 80 && clientX < midX + 80 && clientY > midY + 60 && clientY < midY + 100) { showUpdateModal = true; }
    } 
    else if (state === "collection") {
        let clicked = false;
        const keys = Object.keys(itemsDB), size = 50, gap = 20, cols = 4;
        const startX = (W - (cols * size + (cols - 1) * gap)) / 2, startY = 120;
        
        keys.forEach((key, i) => {
            let x = startX + (i % cols) * (size + gap);
            let y = startY + Math.floor(i / cols) * (size + gap + 20);
            if (clientX > x && clientX < x + size && clientY > y && clientY < y + size) {
                selectedItem = key;
                clicked = true;
            }
        });
        if (!clicked && clientY > H - 60) state = "menu";
    }
    else if (state === "game") { 
        lastX = clientX; 
        isDragging = true; 
    }
    else if (state === "gameover") {
        if (clientX > midX - 80 && clientX < midX + 80 && clientY > midY + 70 && clientY < midY + 110) { resetGame(); state = "game"; }
        else if (clientX > midX - 80 && clientX < midX + 80 && clientY > midY + 130 && clientY < midY + 170) { state = "menu"; }
    }
}

canvas.addEventListener("touchstart", e => { e.preventDefault(); startAction(e.touches[0].clientX, e.touches[0].clientY); }, { passive: false });
canvas.addEventListener("touchmove", e => { 
    e.preventDefault(); 
    if (isDragging && state === "game" && jumpLock <= 0) { 
        cat.x += e.touches[0].clientX - lastX; 
        lastX = e.touches[0].clientX; 
    } 
}, { passive: false });
canvas.addEventListener("touchend", () => isDragging = false);

function drawBtn(x, y, text, color) {
    ctx.fillStyle = color;
    ctx.fillRect(x - 80, y - 20, 160, 40);
    ctx.fillStyle = "white"; ctx.textAlign = "center";
    ctx.font = "20px 'ouroboros', sans-serif";
    ctx.fillText(text, x, y + 8);
}

function drawPetals() {
    ctx.fillStyle = "#FFB7C5";
    petals.forEach(p => {
        ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.angle);
        ctx.beginPath(); ctx.ellipse(0, 0, p.size, p.size / 2, 0, 0, Math.PI * 2); ctx.fill();
        ctx.restore();
        p.y += p.speed; p.x += Math.sin(p.y / 30) * p.swing; p.angle += 0.02;
        if (p.y > H) { p.y = -10; p.x = Math.random() * W; }
    });
}

function updateGame() {
    for (let l in levelSettings) { if (score >= levelSettings[l].minScore) level = parseInt(l); }

    if (jumpLock > 0) {
        cat.x += jumpDir; jumpLock--;
    }
    let margin = (cat.w * cat.scale) / 2;
    cat.x = Math.max(margin, Math.min(W - margin, cat.x));

    if (loadedImages.cat) {
        let dw = cat.w * cat.scale, dh = cat.h * cat.scale;
        ctx.drawImage(images.cat, cat.x - dw / 2, cat.y - dh / 2, dw, dh);
    } else {
        ctx.font = "40px serif";
        ctx.textAlign = "center";
        ctx.fillText("🐈", cat.x, cat.y);
    }

    if (Math.random() < 0.04) {
        let typeRand = Math.random();
        let newItem = { x: Math.random() * (W - 60) + 30, y: -50, type: "star", points: 1, speed: (3 + Math.random() * 4) * levelSettings[level].speed };

        let heartChance = Math.min(0.005, 0.001 + (Math.min(level, 5) - 1) * 0.001);

        if (typeRand < heartChance) { 
            newItem.type = "heart"; 
        }
        else if (typeRand < 0.04) { 
            newItem.type = "pepper"; 
            newItem.points = 5; 
        }
        else if (typeRand < 0.25) { 
            newItem.type = "bomb"; 
        }
        else if (typeRand < 0.35 && level >= 2) { 
            newItem.type = "fish"; 
            newItem.points = 2; 
        }
        else if (typeRand < 0.45 && level >= 3) { 
            newItem.type = "milk"; 
            newItem.points = 3; 
        }
        else if (typeRand < 0.55 && level >= 3) { 
            newItem.type = "cucumber"; 
            newItem.points = -2; 
            newItem.speed *= 1.2; 
        }
        else if (typeRand < 0.60 && level >= 4) { 
            newItem.type = "can"; 
            newItem.points = 4; 
        } 
        items.push(newItem);
    }
    for (let i = items.length - 1; i >= 0; i--) {
        let item = items[i];
        let currentSpeed = item.speed;
        if (item.type === "bomb") {
            currentSpeed *= (1 + (bombChaos - 1) * 0.4);
            if (milkTimer > 0) currentSpeed *= 0.4;
        }
        item.y += currentSpeed;

        ctx.save();
        let baseSize = (item.type === "bomb") ? 35 * bombChaos : 32;
        if (item.type === "fish") baseSize = 42; 
        
        if (buffTimer > 0 && (item.type === "star" || item.type === "fish" || item.type === "milk")) {
            baseSize *= 1.5;
            ctx.shadowColor = "#FFF";
            ctx.shadowBlur = 10;
        }

        if (loadedImages[item.type]) {
            let img = images[item.type];
            let aspect = img.width / img.height;
            let drawW, drawH;
            if (aspect > 1) { drawW = baseSize; drawH = baseSize / aspect; } 
            else { drawH = baseSize; drawW = baseSize * aspect; }
            if (item.type === "bomb" && milkTimer > 0) { ctx.shadowColor = "cyan"; ctx.shadowBlur = 15; }
            ctx.drawImage(img, item.x - drawW/2, item.y - drawH/2, drawW, drawH);
        } else {
            ctx.font = baseSize + "px serif";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            const fallbacks = { star: "⭐", fish: "🐟", bomb: "💣", heart: "❤️", pepper: "🌶️", milk: "🥛", cucumber: "🥒", can: "🥫" };
            ctx.fillText(fallbacks[item.type] || "?", item.x, item.y);
        }
        ctx.restore();

        if (Math.hypot(item.x - cat.x, item.y - (cat.y - 10)) < (buffTimer > 0 ? 55 : 40)) {
            if (itemsDB[item.type]) {
                if (!itemsDB[item.type].unlocked) { itemsDB[item.type].unlocked = true; saveCollection(); }
                
                if (item.type === "bomb") {
                    playSound(sndExplode);
                    lives--;
                    if (lives <= 0) {
                        if (score > highScore) { highScore = score; localStorage.setItem("catHighScore", highScore); }
                        state = "gameover";
                    }
                } else if (item.type === "pepper") {
                    playSound(sndBurn);
                    score += item.points;
                    bombChaos += 0.15;
                } else if (item.type === "star" || item.type === "fish" || item.type === "milk" || item.type === "can" || item.type === "heart") {
                    playSound(sndCollect);
                    if (item.type === "heart") {
                        if (lives < 3) lives++;
                    } else {
                        score += item.points || 0;
                        if (item.type === "milk") milkTimer = 180;
                        if (item.type === "can") buffTimer = 300;
                    }
                } else if (item.type === "cucumber") {
                    score += item.points;
                    jumpLock = 20;
                    jumpDir = (cat.x > W/2 ? -1 : 1) * 12;
                }
            }
            items.splice(i, 1);
            continue;
        }
        if (item.y > H + 50) items.splice(i, 1);
    }

    if (milkTimer > 0) milkTimer--;
    if (buffTimer > 0) buffTimer--;

    ctx.font = "bold 18px 'ouroboros'"; ctx.textAlign = "left"; ctx.fillStyle = "white";
    ctx.fillText("⭐ " + score, 20, 40); 
    ctx.fillText("❤️ " + lives, 20, 65); // На 25 пикселей ниже
    
    ctx.textAlign = "right"; ctx.fillText("🏆 " + highScore, W - 20, 40);
    ctx.textAlign = "center"; ctx.fillStyle = "#FFEEC0";
    ctx.fillText(levelSettings[level].title.toUpperCase(), W / 2, 40);
}

function drawMenu() {
    ctx.textAlign = "center"; ctx.fillStyle = "#ff85a2";
    ctx.font = "bold 24px 'ouroboros'";
    ctx.fillText("С 8 Марта, котик ♡♡", W / 2, H / 2 - 140);
    drawBtn(W / 2, H / 2 - 60, "Играть", "#ff85a2");
    drawBtn(W / 2, H / 2 + 10, "Коллекция", "#ff85a2");
    drawBtn(W / 2, H / 2 + 80, "Скоро...", "#ff85a2");
}

function drawMuteBtn() {
    const x = W - 40, y = H - 40, radius = 20;
    ctx.save();
    ctx.fillStyle = "rgba(255, 255, 255, 0.3)";
    ctx.beginPath(); ctx.arc(x, y, radius, 0, Math.PI * 2); ctx.fill();
    ctx.textAlign = "center"; ctx.textBaseline = "middle"; ctx.font = "20px sans-serif";
    ctx.fillText(isMusicMuted ? "🔇" : "🔊", x, y);
    ctx.restore();
}

function drawModal() {
    ctx.fillStyle = "rgba(0,0,0,0.6)";
    ctx.fillRect(0, 0, W, H);
    
    const mw = 240, mh = 100;
    const mx = (W - mw) / 2, my = (H - mh) / 2;
    
    ctx.fillStyle = "white";
    ctx.fillRect(mx, my, mw, mh);
    ctx.strokeStyle = "#ff85a2";
    ctx.lineWidth = 4;
    ctx.strokeRect(mx, my, mw, mh);
    
    ctx.fillStyle = "#111";
    ctx.textAlign = "center";
    ctx.font = "16px 'ouroboros'";
    wrapText("Скоро будет...", W / 2, H / 2 + 5, mw - 20, 20);
}

function drawCollection() {
    ctx.textAlign = "center"; ctx.fillStyle = "white"; ctx.font = "bold 25px 'ouroboros'"; 
    ctx.fillText("Твои находки", W / 2, 60);
    const keys = Object.keys(itemsDB), size = 50, gap = 20, cols = 4;
    const startX = (W - (cols * size + (cols - 1) * gap)) / 2, startY = 120;

    keys.forEach((key, i) => {
        let x = startX + (i % cols) * (size + gap), y = startY + Math.floor(i / cols) * (size + gap + 20);
        if (itemsDB[key].unlocked && loadedImages[key]) {
            let img = images[key];
            let aspect = img.width / img.height;
            let drawW, drawH;
            if (aspect > 1) { drawW = size; drawH = size / aspect; } 
            else { drawH = size; drawW = size * aspect; }
            ctx.drawImage(img, x + (size - drawW)/2, y + (size - drawH)/2, drawW, drawH);
        } else {
            ctx.fillStyle = "rgba(0,0,0,0.5)"; ctx.beginPath(); ctx.arc(x+25, y+25, 25, 0, 7); ctx.fill();
            ctx.fillStyle = "white"; ctx.font = "20px 'ouroboros'"; ctx.fillText("?", x+25, y+35);
        }
    });

    if (selectedItem) {
        ctx.fillStyle = "white"; 
        ctx.font = "bold 18px 'ouroboros'"; 
        ctx.fillText(itemsDB[selectedItem].name, W / 2, H - 160);
        
        ctx.font = "16px 'ouroboros'"; 
        let txt = itemsDB[selectedItem].unlocked ? itemsDB[selectedItem].desc : "Ты ещё не знаешь что это, дорогая.";
        wrapText(txt, W / 2, H - 130, W - 40, 20); 
    }
    ctx.fillStyle = "#ff5476"; ctx.font = "18px 'ouroboros'"; ctx.fillText("назад в меню", W / 2, H - 40);
}

function drawGameOver() {
    ctx.textAlign = "center";
    ctx.fillStyle = "#ff4444"; ctx.font = "bold 40px 'ouroboros'"; ctx.fillText("game over", W / 2, H / 2 - 80);
    ctx.fillStyle = "white"; ctx.font = "20px 'ouroboros', sans-serif";
    ctx.fillText("(но ты всё равно умничка 💋)", W / 2, H / 2 - 30);
    ctx.font = "18px 'ouroboros'";
    ctx.fillText("Счёт: " + score, W / 2, H / 2 + 10);
    drawBtn(W / 2, H / 2 + 90, "Заново", "#ff85a2");
    drawBtn(W / 2, H / 2 + 150, "В меню", "#ffb7c5");
}

function loop() {
    ctx.clearRect(0, 0, W, H);
    let grad = ctx.createLinearGradient(0, 0, 0, H);
    grad.addColorStop(0, "#a8e6cf"); grad.addColorStop(1, "#ffd3b6");
    ctx.fillStyle = grad; ctx.fillRect(0, 0, W, H);
    
    drawPetals();
    if (state === "menu") drawMenu();
    else if (state === "collection") drawCollection();
    else if (state === "game") updateGame();
    else if (state === "gameover") drawGameOver();

    if (showUpdateModal) drawModal();

    drawMuteBtn();
    requestAnimationFrame(loop);
}

resize();
loop();
</script>
</body>
</html>
